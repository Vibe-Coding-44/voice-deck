<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/theme/night.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
  :root {
    --accent: #a78bfa;
    --r-heading-font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    --r-main-font: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    --r-heading-color: #f5f5f5;
    --r-main-color: #d4d4d8;
    --r-link-color: var(--accent);
  }
  .reveal h1 { font-size: 2.2em; letter-spacing: -0.02em; }
  .reveal h2 { font-size: 1.6em; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 0.2em; margin-bottom: 0.6em; }
  .reveal h3 { font-size: 1.2em; color: #c4b5fd; }
  .reveal ul { list-style: none; padding: 0; }
  .reveal ul li { padding: 0.3em 0 0.3em 1.4em; position: relative; }
  .reveal ul li::before { content: "▸"; color: var(--accent); position: absolute; left: 0; }
  .reveal pre { border-radius: 8px; border: 1px solid #3f3f46; }
  .reveal code { background: #27272a; padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.85em; }
  .reveal pre code { background: transparent; padding: 0; }
  .reveal section { text-align: left; padding: 0 2em; }
  .reveal .slides section:first-child { text-align: center; }
</style>
</head>
<body>
<div class="reveal">
  <div class="slides">
{{SLIDES}}
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
  Reveal.initialize({
    hash: true,
    transition: 'slide',
    transitionSpeed: 'fast',
    controls: true,
    progress: true,
    center: false,
    plugins: [],
  });
  document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
</script>
</body>
</html>
